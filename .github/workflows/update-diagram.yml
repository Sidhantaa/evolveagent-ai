name: Update Architecture Diagram

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  render-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract Mermaid diagram from README
        run: |
          python3 - <<'EOF'
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          match = re.search(r'```mermaid\n(.*?)```', content, re.DOTALL)
          if match:
              with open('diagram.mmd', 'w') as f:
                  f.write(match.group(1))
          EOF

      - name: Render diagram
        run: |
          mmdc -i diagram.mmd -o docs/architecture.png -t base -b '#ffffff' --width 2400 \
          --cssFile /dev/stdin << 'CSSEOF'
          .node rect { fill: #E8E4FC; stroke: #7C6FE0; stroke-width: 2px; }
          .node circle { fill: #E1F5EE; stroke: #3DBFA0; stroke-width: 2px; }
          .node polygon { fill: #FEF3E2; stroke: #F0A500; stroke-width: 2px; }
          .edgePath path { stroke: #6B7280; stroke-width: 1.5px; }
          .edgeLabel { background-color: #F9FAFB; }
          .label { font-family: ui-sans-serif, system-ui, sans-serif; }
          CSSEOF

      - name: Commit updated diagram
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/architecture.png
          git diff --staged --quiet || git commit -m "Auto-update architecture diagram"
          git push
