name: Update Architecture Diagram

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  render-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract Mermaid diagram from README
        run: |
          python3 - <<'EOF'
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          match = re.search(r'```mermaid\n(.*?)```', content, re.DOTALL)
          if match:
              with open('diagram.mmd', 'w') as f:
                  f.write(match.group(1))
              print("Diagram extracted successfully")
          else:
              print("No mermaid diagram found")
              exit(1)
          EOF

      - name: Create custom theme config
        run: |
          cat > mermaid-config.json << 'EOF'
          {
            "theme": "base",
            "themeVariables": {
              "primaryColor": "#E8E4FC",
              "primaryBorderColor": "#7C6FE0",
              "primaryTextColor": "#1a1a2e",
              "secondaryColor": "#E1F5EE",
              "secondaryBorderColor": "#3DBFA0",
              "tertiaryColor": "#FEF3E2",
              "tertiaryBorderColor": "#F0A500",
              "lineColor": "#6B7280",
              "fontSize": "16px",
              "fontFamily": "ui-sans-serif, system-ui, sans-serif",
              "edgeLabelBackground":
