name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      LLM_MODE: mock
      DEFAULT_PROVIDER: mock
      IMAGE_MODE: mock
      TRANSCRIPTION_MODE: mock
      LINEAR_SYNC_ENABLED: "false"
      LINEAR_CURSOR_WORKER: "false"
      CODEX_WORKER_ENABLED: "false"
      AUTO_GIT_PUSH: "false"
      # Postgres backend parity tests run against this service; other tests ignore it.
      TEST_DATABASE_URL: "postgresql+psycopg://evolveagent:evolveagent@localhost:5432/evolveagent"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: evolveagent
          POSTGRES_PASSWORD: evolveagent
          POSTGRES_DB: evolveagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evolveagent -d evolveagent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
